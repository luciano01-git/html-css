<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>

        /* configuraçào globais das css, quando eu botei a tag to top, AS as cores ficaram zebrada, essa configuração global e para ajustare ficar um degrade normal*/
        *{ 
            height: 100%;
        }
        body {
           background-image: linear-gradient(to top, #40EBDA, #50C2B8, #529994); /* o degrade com a tag to top começa de baixo pra cima*/
        }
    </style>
</head>
<body>
    
    <h1>Gradiente</h1>



</body>
</html>
