<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'lucky';
            src: url('Mr Lucky Clover.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'lucky', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
        h2{
            font-family: 'lucky', Times, serif;
            font-size: 2em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Qui quam quos excepturi ipsa quasi rem, quidem quis vel fuga illum dolores quas dolorum? Quam libero voluptatem voluptate animi. Laudantium, neque.</p>
        <h2>Título 2</h2>
</body>
</html>
